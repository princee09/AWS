name: Deploy Backend to EC2

on:
  push:
    branches:
      - main
    paths:
      # PRO-TIP: This tells GitHub ONLY to run this server update if you changed Backend code!
      # It won't waste time restarting your server if you only updated the Vercel Frontend.
      - 'Backend/**' 

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to AWS EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Navigate to your backend folder (Update 'test5' to your actual repo folder name if different)
            cd /home/ec2-user/test5/Backend
            
            # 2. Pull the latest code from GitHub
            git pull origin main
            
            # 3. Install any new dependencies (like cors, express, etc.)
            npm install
            
            # 4. Restart all 4 of your load-balanced workers perfectly
            pm2 restart all