name: Deploy App Two

on:
  push:
    branches:
      - app-two

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy App Two to AWS EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Go to the NEW folder
            cd /home/ec2-user/secondapp
            
            # Pull the new branch
            git pull origin app-two
            
            # Install packages
            npm install
            
            # Restart ONLY the second app's workers
            pm2 restart worker-4001 worker-4002 worker-4003 worker-4004