<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS + Vercel Connection</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

        * {
            box-sizing: border-box;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); 
            color: #e2e8f0; 
        }

        .card { 
            background: rgba(15, 23, 42, 0.75); 
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px 30px; 
            border-radius: 16px; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); 
            width: 100%;
            max-width: 420px; 
            text-align: center;
        }

        h1 {
            margin-top: 0;
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        p {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 30px;
        }

        button { 
            width: 100%;
            padding: 14px 20px; 
            font-size: 15px; 
            font-weight: 600; 
            cursor: pointer; 
            background: linear-gradient(135deg, #6366f1, #3b82f6); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            transition: all 0.2s ease; 
            margin-bottom: 25px;
            box-shadow: 0 4px 14px 0 rgba(99, 102, 241, 0.39);
        }

        button:hover { 
            background: linear-gradient(135deg, #4f46e5, #2563eb);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.5);
            transform: translateY(-1px);
        }

        button:active { 
            transform: translateY(2px); 
            box-shadow: 0 2px 10px rgba(99, 102, 241, 0.3);
        }

        #response-box { 
            padding: 20px; 
            border-radius: 8px; 
            min-height: 80px; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            font-size: 15px;
            font-weight: 600;
            background-color: rgba(0, 0, 0, 0.2); 
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
            word-wrap: break-word;
            line-height: 1.5;
        }

        /* State Classes targeted by the JS */
        .success { 
            color: #86efac !important; 
            border-color: rgba(74, 222, 128, 0.4) !important; 
            background-color: rgba(22, 101, 52, 0.3) !important;
            box-shadow: 0 0 15px rgba(74, 222, 128, 0.1);
        }

        .error { 
            color: #fca5a5 !important; 
            border-color: rgba(248, 113, 113, 0.4) !important; 
            background-color: rgba(127, 29, 29, 0.3) !important;
            box-shadow: 0 0 15px rgba(248, 113, 113, 0.1);
        }

        .fetching { 
            color: #fcd34d !important; 
            border-color: rgba(251, 191, 36, 0.4) !important;
            background-color: rgba(120, 53, 15, 0.3) !important;
            animation: pulse 1.5s infinite alternate;
        }

        @keyframes pulse {
            from { box-shadow: 0 0 5px rgba(251, 191, 36, 0.05); }
            to { box-shadow: 0 0 20px rgba(251, 191, 36, 0.25); }
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>AWS Backend Tester</h1>
        <p>Connecting securely via Vercel Proxy.</p>
        
        <button onclick="testBackend()">Send Request to EC2</button>

        <div id="response-box">Awaiting connection...</div>
    </div>

    <script>
        async function testBackend() {
            const box = document.getElementById('response-box');
            box.innerHTML = "Connecting to AWS...";
            box.className = "fetching";

            try {
                //
                const response = await fetch('https://my-aws-api.duckdns.org/');

                if (response.status === 429) {
                    box.innerHTML = "🚨 429 Error: Rate Limit Hit!<br><span style='font-size: 13px; color: #94a3b8; font-weight: 400; margin-top: 6px; display: inline-block;'>You clicked too fast. Wait a moment.</span>";
                    box.className = "error";
                    return;
                }

                if (response.ok) {
                    const data = await response.text();
                    box.innerHTML = `✅ Success!<br><span style='color: #f1f5f9; font-weight: 400; margin-top: 8px; display: inline-block;'>${data}</span>`;
                    box.className = "success";
                } else {
                    // If Vercel fails to proxy, it usually throws a 404, 500, or 502
                    box.innerHTML = `⚠️ Proxy Error: Vercel returned status ${response.status}`;
                    box.className = "error";
                }

            } catch (error) {
                box.innerHTML = "❌ Network Error!<br><span style='font-size: 13px; color: #94a3b8; font-weight: 400; margin-top: 6px; display: inline-block;'>Check console for details.</span>";
                box.className = "error";
                console.error("Fetch failed:", error);
            }
        }
    </script>
</body>
</html>
