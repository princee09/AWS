<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Direct EC2 Connection</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 50px; background-color: #f0f2f5; }
        .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 8px 16px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        button { padding: 15px 30px; font-size: 16px; font-weight: bold; cursor: pointer; background-color: #ff9900; color: white; border: none; border-radius: 8px; transition: 0.2s; }
        button:hover { background-color: #e68a00; }
        button:active { transform: scale(0.95); }
        #response-box { margin-top: 25px; padding: 20px; border: 2px dashed #ccc; border-radius: 8px; min-height: 60px; font-weight: bold; background-color: #fafafa; font-size: 18px;}
        .success { color: #28a745; border-color: #28a745 !important; background-color: #e8f5e9 !important;}
        .error { color: #dc3545; border-color: #dc3545 !important; background-color: #ffebee !important;}
    </style>
</head>
<body>

    <div class="card">
        <h1>AWS Backend Tester</h1>
        <p>Connecting directly to public IPv4.</p>
        
        <button onclick="testBackend()">Send Request to EC2</button>

        <div id="response-box">Awaiting connection...</div>
    </div>

    <script>
        // Use your EC2 Public IP address here!
        const ec2Url = "http://3.17.36.170/";

        async function testBackend() {
            const box = document.getElementById('response-box');
            box.innerHTML = "Connecting to AWS...";
            box.className = "";

            try {
                // Fetching directly from the IPv4 address
                const response = await fetch('/api/');

                if (response.status === 429) {
                    box.innerHTML = "🚨 429 Error: Rate Limit Hit!<br><span style='font-size: 14px; color: #666;'>You clicked too fast. Wait a moment.</span>";
                    box.className = "error";
                    return;
                }

                if (response.ok) {
                    const data = await response.text();
                    box.innerHTML = `✅ Success!<br><br><span style='color: #333;'>${data}</span>`;
                    box.className = "success";
                } else {
                    box.innerHTML = `⚠️ Error: Server returned ${response.status}`;
                    box.className = "error";
                }

            } catch (error) {
                box.innerHTML = "❌ Network Error!<br><span style='font-size: 14px; color: #666;'>Check if EC2 is running and CORS is allowed.</span>";
                box.className = "error";
                console.error(error);
            }
        }
    </script>
</body>
</html>
